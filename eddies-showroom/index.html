<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Eddie's Showroom</title>

<!-- Schema.org markup template (rendered per-vehicle on /v/[slug]) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org/",
  "@type": "Person",
  "name": "Eddie Marquez",
  "jobTitle": "Used Car Salesman",
  "worksFor": { "@type": "AutoDealer", "name": "Bay 4 Motors" }
}
</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="chat-widget.jsx"></script>
<script type="text/babel" src="homepage.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="_shell.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState } = React;
const D = window.SHOWROOM_DATA;

function HomePage() {
  const [chat, setChat] = useState(false);
  return (
    <window.AppShell>
      {(lang, setLang) => (
        <div data-screen-label="Homepage">
          <window.Homepage
            data={D} lang={lang} setLang={setLang}
            onChat={() => setChat(true)}
            onNavToCar={(slug) => window.nav.car(slug)}
            onNavToAdmin={() => window.nav.admin("home")}
            onTextEddie={() => { window.location.href = "sms:" + D.settings.phone; }} />
          <window.ChatWidget lang={lang} open={chat}
            onOpen={() => setChat(true)} onClose={() => setChat(false)} />
        </div>
      )}
    </window.AppShell>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<HomePage />);
</script>
</body>
</html>
